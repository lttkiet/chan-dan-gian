name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-core:
    name: Build Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/ChanDanGian.Core/ChanDanGian.Core.csproj

      - name: Build Core
        run: dotnet build src/ChanDanGian.Core/ChanDanGian.Core.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/ChanDanGian.Tests/ChanDanGian.Tests.csproj -c Release --no-restore --verbosity normal

  build-browser:
    name: Build Browser (WASM)
    runs-on: ubuntu-latest
    needs: build-core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          workloads: wasm-tools

      - name: Restore
        run: dotnet restore src/ChanDanGian/ChanDanGian.Browser/ChanDanGian.Browser.csproj

      - name: Publish Browser
        run: dotnet publish src/ChanDanGian/ChanDanGian.Browser/ChanDanGian.Browser.csproj -c Release -o release-browser

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: browser-wasm
          path: release-browser/wwwroot/
          retention-days: 7

  build-desktop:
    name: Build Desktop
    runs-on: ${{ matrix.os }}
    needs: build-core
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/ChanDanGian/ChanDanGian.Desktop/ChanDanGian.Desktop.csproj

      - name: Publish
        run: dotnet publish src/ChanDanGian/ChanDanGian.Desktop/ChanDanGian.Desktop.csproj -c Release -r ${{ matrix.rid }} --self-contained -o release-${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.rid }}
          path: release-${{ matrix.rid }}/
          retention-days: 7
