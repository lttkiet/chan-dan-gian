name: Build (Manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'web'
        type: choice
        options:
          - web

jobs:
  build:
    name: Build ${{ github.event.inputs.platform }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build web export
        if: github.event.inputs.platform == 'web'
        run: npx expo export --platform web

      - name: Upload web build
        if: github.event.inputs.platform == 'web'
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.run_number }}
          path: dist/
          retention-days: 3
