name: Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - web

jobs:
  build-web:
    name: Build Web
    if: github.event.inputs.platform == 'web'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build web export
        run: npx expo export --platform web

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.run_number }}
          path: dist/
          retention-days: 3

  build-android:
    name: Build Android (EAS)
    if: github.event.inputs.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Android APK via EAS
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Print build info
        run: |
          echo "Build submitted to EAS Build."
          echo "Check the build at: https://expo.dev/accounts/lekiet0101/projects/chan-dan-gian"
