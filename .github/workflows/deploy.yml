name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Browser (WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/ChanDanGian/ChanDanGian.Browser/ChanDanGian.Browser.csproj

      - name: Publish Browser
        run: dotnet publish src/ChanDanGian/ChanDanGian.Browser/ChanDanGian.Browser.csproj -c Release -o release-browser

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: release-browser/wwwroot/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
